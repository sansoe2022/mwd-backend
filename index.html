<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWD API Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background-color: #f5f5f6; }
        .material-input { border-bottom: 2px solid #e0e0e0; transition: all 0.3s; }
        .material-input:focus { border-bottom: 2px solid #3b82f6; outline: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto space-y-6">
        
        <div class="flex items-center justify-between">
            <h2 class="text-3xl font-bold text-gray-800 flex items-center gap-2">
                <span class="material-icons text-blue-600 text-4xl">admin_panel_settings</span>
                MWD Admin Panel
            </h2>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-blue-600">
            <label class="block text-sm font-semibold text-gray-600 mb-2">GitHub Personal Access Token</label>
            <div class="flex flex-col md:flex-row gap-4">
                <div class="relative flex-1">
                    <span class="material-icons absolute left-3 top-3 text-gray-400">key</span>
                    <input type="password" id="githubToken" class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
                </div>
                <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg shadow-md font-medium transition flex items-center justify-center gap-2">
                    <span class="material-icons">cloud_download</span> Load Data
                </button>
            </div>
            <div id="statusMessage" class="hidden mt-4 p-3 rounded-md text-sm font-medium"></div>
        </div>

        <div id="editorSection" class="hidden space-y-6">
            
            <div class="bg-white p-6 rounded-xl shadow-md">
                <h3 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2 border-b pb-2">
                    <span class="material-icons text-gray-500">settings_applications</span> App Info & Rates
                </h3>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">TH Rate</label>
                        <input type="number" id="thRate" class="w-full mt-2 p-2 material-input bg-transparent text-lg font-medium">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">MM Rate</label>
                        <input type="number" id="mmRate" class="w-full mt-2 p-2 material-input bg-transparent text-lg font-medium">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">Version Code</label>
                        <input type="number" id="versionCode" class="w-full mt-2 p-2 material-input bg-transparent text-lg font-medium">
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">Update Title</label>
                        <input type="text" id="appTitle" class="w-full mt-2 p-2 material-input bg-transparent text-lg">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">Update Message</label>
                        <textarea id="appMessage" rows="2" class="w-full mt-2 p-2 bg-gray-50 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">App Link (Play Store)</label>
                        <input type="text" id="appLink" class="w-full mt-2 p-2 material-input bg-transparent">
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h3 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                        <span class="material-icons text-gray-500">receipt_long</span> Bills List (THB to MMK)
                    </h3>
                    <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full" id="itemCount">0 Items</span>
                </div>

                <div class="flex flex-col md:flex-row gap-4 mb-6 bg-gray-50 p-4 rounded-lg border border-gray-200 items-end">
                    <div class="flex-1">
                        <label class="block text-xs font-semibold text-gray-600 mb-1">THB Bill</label>
                        <input type="number" id="newThb" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. 265">
                    </div>
                    <div class="flex-1">
                        <label class="block text-xs font-semibold text-gray-600 mb-1">MMK Bill</label>
                        <input type="number" id="newMmk" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. 31000">
                    </div>
                    <button onclick="addItem()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-md shadow flex items-center gap-1 transition h-[42px]">
                        <span class="material-icons text-sm">add</span> Add
                    </button>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 text-gray-600 text-sm uppercase tracking-wider">
                                <th class="p-3 rounded-tl-lg">No.</th>
                                <th class="p-3">THB Bill</th>
                                <th class="p-3">MMK Bill</th>
                                <th class="p-3 text-right rounded-tr-lg">Action</th>
                            </tr>
                        </thead>
                        <tbody id="itemsTableBody" class="divide-y divide-gray-200">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="flex justify-end sticky bottom-6">
                <button onclick="saveData()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-full shadow-lg font-bold text-lg transition transform hover:scale-105 flex items-center gap-2">
                    <span class="material-icons">save</span> Save & Update GitHub
                </button>
            </div>

        </div>
    </div>

    <script>
        const owner = "sansoe2022";
        const repo = "mwd-web";
        const path = "api.json";
        
        let fileSha = ""; 
        let originalData = {};
        let itemsArray = []; // Global array to hold items

        // Utility: Encode/Decode Base64 for Unicode
        function utf8_to_b64(str) { return window.btoa(unescape(encodeURIComponent(str))); }
        function b64_to_utf8(str) { return decodeURIComponent(escape(window.atob(str))); }
        
        // Utility: Generate fake 24-char hex ID for new items
        function generateObjectId() {
            return [...Array(24)].map(() => Math.floor(Math.random() * 16).toString(16)).join('');
        }

        function showStatus(message, isError = false) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = `mt-4 p-3 rounded-md text-sm font-medium block flex items-center gap-2 ${isError ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
            statusEl.innerHTML = `<span class="material-icons">${isError ? 'error' : 'check_circle'}</span> ${message}`;
            statusEl.style.display = 'block';
            setTimeout(() => { statusEl.style.display = 'none'; }, 5000);
        }

        async function fetchData() {
            const token = document.getElementById('githubToken').value;
            if (!token) { showStatus("Please enter your GitHub Token.", true); return; }

            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error("Failed to fetch data. Check your token.");

                const data = await response.json();
                fileSha = data.sha; 
                
                originalData = JSON.parse(b64_to_utf8(data.content));
                itemsArray = originalData.items || [];

                // Populate Info Form
                document.getElementById('thRate').value = originalData.thRate;
                document.getElementById('mmRate').value = originalData.mmRate;
                document.getElementById('versionCode').value = originalData.versionCode;
                document.getElementById('appTitle').value = originalData.title;
                document.getElementById('appMessage').value = originalData.message;
                document.getElementById('appLink').value = originalData.link;

                renderTable();
                document.getElementById('editorSection').classList.remove('hidden');
                showStatus("Data loaded successfully!");

            } catch (error) {
                showStatus(error.message, true);
            }
        }

        function renderTable() {
            const tbody = document.getElementById('itemsTableBody');
            document.getElementById('itemCount').textContent = `${itemsArray.length} Items`;
            tbody.innerHTML = '';

            itemsArray.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50 transition group";
                tr.innerHTML = `
                    <td class="p-3 text-sm text-gray-500">${index + 1}</td>
                    <td class="p-3 font-medium text-gray-800">${item.thbBill} THB</td>
                    <td class="p-3 font-medium text-gray-800">${item.mmkBill} MMK</td>
                    <td class="p-3 text-right">
                        <button onclick="deleteItem(${index})" class="text-red-400 hover:text-red-600 transition p-1 bg-red-50 hover:bg-red-100 rounded-full opacity-0 group-hover:opacity-100">
                            <span class="material-icons text-sm">delete</span>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function addItem() {
            const thb = document.getElementById('newThb').value;
            const mmk = document.getElementById('newMmk').value;

            if(!thb || !mmk) { alert("Please enter both THB and MMK values."); return; }

            const newItem = {
                thbBill: thb.toString(),
                mmkBill: mmk.toString(),
                _id: generateObjectId()
            };

            itemsArray.push(newItem);
            
            // Clear inputs
            document.getElementById('newThb').value = '';
            document.getElementById('newMmk').value = '';
            
            renderTable();
        }

        function deleteItem(index) {
            if(confirm("Are you sure you want to delete this item?")) {
                itemsArray.splice(index, 1);
                renderTable();
            }
        }

        async function saveData() {
            const token = document.getElementById('githubToken').value;
            const btn = event.currentTarget;
            const originalBtnHtml = btn.innerHTML;
            
            try {
                btn.innerHTML = `<span class="material-icons animate-spin">autorenew</span> Saving...`;
                btn.disabled = true;

                const updatedData = {
                    _id: originalData._id,
                    thRate: parseInt(document.getElementById('thRate').value),
                    mmRate: parseInt(document.getElementById('mmRate').value),
                    versionCode: parseInt(document.getElementById('versionCode').value),
                    title: document.getElementById('appTitle').value,
                    message: document.getElementById('appMessage').value,
                    link: document.getElementById('appLink').value,
                    items: itemsArray,
                    __v: originalData.__v
                };

                const base64Content = utf8_to_b64(JSON.stringify(updatedData, null, 2));

                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: "Update api.json via Material Admin Panel",
                        content: base64Content,
                        sha: fileSha
                    })
                });

                if (!response.ok) throw new Error("Failed to update data.");

                const responseData = await response.json();
                fileSha = responseData.content.sha; 
                
                showStatus("Successfully saved and updated to GitHub!");

            } catch (error) {
                showStatus(error.message, true);
            } finally {
                btn.innerHTML = originalBtnHtml;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
